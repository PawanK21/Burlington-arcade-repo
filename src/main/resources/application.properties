spring.application.name=Burlington Arcade Sales Deck

# ─── Server (Railway provides $PORT) ───
server.port=${PORT:8080}

# ─── JWT Configuration (override JWT_SECRET in Railway env vars) ───
jwt.secret=${JWT_SECRET:4D6251655468576D5A7134743777217A25432A462D4A614E645267556B587032}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# ─── Database (defaults to H2 file-mode; override for Postgres in Railway) ───
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/burlington-arcade;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.open-in-view=false

# ─── H2 Console (disabled in production) ───
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ─── Security: hide error details ───
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ─── Static resources ───
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ─── Logging ───
logging.level.com.burlington=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
